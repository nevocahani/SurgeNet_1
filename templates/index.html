<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurgeNet</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:    #D93A46;
  --green:  #05C08A;
  --yellow: #F5C842;
  --blue:   #3BBDE0;
  --purple: #B06CE3;
  --bg:     #F7F8FC;
  --white:  #FFFFFF;
  --s1:     #F0F1F7;
  --border: #E2E4ED;
  --text:   #1A1B2E;
  --muted:  #7B7D99;
  --mono:   'IBM Plex Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── LOGIN ─────────────────────────────────────────────── */
#login-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, #1A1B2E 0%, #2D1F3D 100%);
}
.login-card {
  background:var(--white); border-radius:20px; padding:48px 44px;
  width:100%; max-width:420px; box-shadow:0 24px 64px rgba(0,0,0,0.25);
}
.login-logo { font-size:30px; font-weight:800; color:var(--red); margin-bottom:2px; }
.login-logo span { color:var(--text); }
.login-sub { font-size:13px; color:var(--muted); margin-bottom:32px; }
.field-group { margin-bottom:18px; }
.field-group label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:7px; }
.field-group input {
  width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px;
  font-family:'Heebo',sans-serif; font-size:14px; color:var(--text);
  transition:border-color .2s; background:var(--white);
}
.field-group input:focus { outline:none; border-color:var(--red); }
.btn-primary {
  width:100%; padding:13px; background:var(--red); color:white; border:none;
  border-radius:10px; font-family:'Heebo',sans-serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:all .2s; margin-top:4px;
}
.btn-primary:hover { background:#b8303b; }
.error-msg { background:#FEF2F2; border:1px solid #FECACA; border-radius:8px; padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; display:none; }
.info-msg  { background:#EFF6FF; border:1px solid #BFDBFE; border-radius:8px; padding:10px 14px; font-size:13px; color:#1D4ED8; margin-bottom:16px; display:none; }

/* ── AVAILABILITY MODAL ──────────────────────────────── */
#avail-modal {
  position:fixed; inset:0; background:rgba(26,27,46,.7); display:none;
  align-items:center; justify-content:center; z-index:200;
}
.avail-card {
  background:var(--white); border-radius:20px; padding:40px; max-width:440px;
  width:90%; text-align:center; box-shadow:0 24px 64px rgba(0,0,0,.2);
}
.avail-emoji { font-size:52px; margin-bottom:14px; }
.avail-title { font-size:22px; font-weight:800; margin-bottom:6px; }
.avail-sub   { color:var(--muted); font-size:14px; margin-bottom:28px; }
.avail-btns  { display:flex; flex-direction:column; gap:10px; }
.btn-avail-yes { padding:13px; background:var(--green); color:white; border:none; border-radius:10px; font-family:'Heebo',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
.btn-avail-no  { padding:13px; background:var(--s1); color:var(--muted); border:1.5px solid var(--border); border-radius:10px; font-family:'Heebo',sans-serif; font-size:14px; cursor:pointer; }
.transport-opts { display:none; margin-top:14px; }
.transport-opt  { padding:11px 14px; border:1.5px solid var(--border); border-radius:9px; cursor:pointer; margin-bottom:8px; font-size:14px; text-align:right; transition:all .2s; }
.transport-opt:hover, .transport-opt.sel { border-color:var(--green); color:var(--green); background:#F0FDF4; }

/* ── APP ─────────────────────────────────────────────── */
#app { display:none; }
.topbar {
  height:58px; background:var(--white); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; position:sticky; top:0; z-index:100;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.topbar-logo { font-size:20px; font-weight:800; color:var(--red); }
.topbar-logo span { color:var(--text); }
.topbar-right { display:flex; align-items:center; gap:14px; }
.user-chip {
  display:flex; align-items:center; gap:9px; background:var(--s1);
  border:1px solid var(--border); border-radius:30px; padding:5px 14px 5px 7px;
}
.user-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; color:white; font-weight:700; }
.user-name  { font-size:13px; font-weight:600; }
.role-badge { font-size:10px; font-family:var(--mono); padding:2px 8px; border-radius:4px; font-weight:600; }
.btn-logout { background:none; border:1.5px solid var(--border); border-radius:8px; padding:5px 14px; font-family:'Heebo',sans-serif; font-size:12px; color:var(--muted); cursor:pointer; transition:all .2s; }
.btn-logout:hover { border-color:var(--red); color:var(--red); }
.live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

/* ── NAV ─────────────────────────────────────────────── */
.sidebar {
  width:220px; background:var(--white); border-left:1px solid var(--border);
  height:calc(100vh - 58px); position:fixed; top:58px; right:0;
  padding:20px 0; overflow-y:auto;
}
.nav-section { padding:0 16px; margin-bottom:4px; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-top:16px; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:10px 20px;
  cursor:pointer; font-size:14px; font-weight:500; color:var(--muted);
  transition:all .15s; border-right:3px solid transparent;
}
.nav-item:hover { background:var(--s1); color:var(--text); }
.nav-item.active { background:#FFF1F2; color:var(--red); border-right-color:var(--red); font-weight:600; }
.nav-icon { font-size:16px; width:20px; text-align:center; }

/* ── CONTENT ─────────────────────────────────────────── */
.main { margin-right:220px; padding:28px; }
.page { display:none; }
.page.active { display:block; }
.page-header { margin-bottom:24px; }
.page-title { font-size:22px; font-weight:800; margin-bottom:3px; }
.page-sub   { font-size:13px; color:var(--muted); }

/* ── CARDS ───────────────────────────────────────────── */
.card { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:16px; }
.card-title { font-size:15px; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
.section-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px; font-family:var(--mono); }

/* ── STATS ROW ───────────────────────────────────────── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.stat-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
.stat-num  { font-family:var(--mono); font-size:32px; font-weight:600; margin-bottom:4px; }
.stat-lbl  { font-size:12px; color:var(--muted); }

/* ── FORM ────────────────────────────────────────────── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-field { display:flex; flex-direction:column; gap:6px; }
.form-field label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.form-field input, .form-field select, .form-field textarea {
  padding:10px 13px; border:1.5px solid var(--border); border-radius:9px;
  font-family:'Heebo',sans-serif; font-size:13px; color:var(--text);
  transition:border-color .2s; background:var(--white); appearance:none; resize:vertical;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline:none; border-color:var(--red); }
.form-field textarea { min-height:80px; }
.urgency-row { display:flex; gap:8px; }
.urg-btn { flex:1; padding:9px; border:1.5px solid var(--border); border-radius:8px; background:var(--white); color:var(--muted); cursor:pointer; font-family:'Heebo',sans-serif; font-size:12px; font-weight:600; transition:all .2s; text-align:center; }
.urg-btn.sel-critical { border-color:var(--red);    color:var(--red);    background:#FFF1F2; }
.urg-btn.sel-high     { border-color:var(--yellow);  color:#B45309;        background:#FFFBEB; }
.urg-btn.sel-medium   { border-color:var(--green);   color:#047857;        background:#F0FDF4; }
.btn-submit { width:100%; padding:13px; background:var(--red); color:white; border:none; border-radius:9px; font-family:'Heebo',sans-serif; font-size:14px; font-weight:700; cursor:pointer; margin-top:4px; transition:all .2s; }
.btn-submit:hover { background:#b8303b; }
.btn-sm { padding:7px 14px; border:1.5px solid var(--border); border-radius:7px; background:var(--white); font-family:'Heebo',sans-serif; font-size:12px; color:var(--muted); cursor:pointer; transition:all .2s; }
.btn-sm:hover { border-color:var(--text); color:var(--text); }
.btn-sm.green { border-color:var(--green); color:var(--green); background:#F0FDF4; }
.btn-sm.red   { border-color:var(--red);   color:var(--red);   background:#FFF1F2; }

/* ── BADGES ──────────────────────────────────────────── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; font-family:var(--mono); white-space:nowrap; }
.badge-red    { background:#FEE2E2; color:var(--red); }
.badge-green  { background:#D1FAE5; color:#047857; }
.badge-yellow { background:#FEF3C7; color:#92400E; }
.badge-blue   { background:#DBEAFE; color:#1E40AF; }
.badge-gray   { background:var(--s1); color:var(--muted); }
.badge-purple { background:#F3E8FF; color:#7C3AED; }

/* ── REQUEST CARD ────────────────────────────────────── */
.req-card {
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:18px 20px; display:flex; align-items:flex-start; gap:14px;
  margin-bottom:10px; transition:box-shadow .2s;
}
.req-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.06); }
.req-card.critical { border-right:4px solid var(--red); }
.req-card.high     { border-right:4px solid var(--yellow); }
.req-card.matched  { border-right:4px solid var(--green); }
.req-card.completed{ border-right:4px solid var(--muted); opacity:.75; }
.req-card.selectable { cursor:pointer; }
.req-main { flex:1; }
.req-title { font-size:15px; font-weight:700; margin-bottom:5px; }
.req-meta  { font-size:12px; color:var(--muted); line-height:1.8; }
.req-meta strong { color:var(--text); }
.req-side  { display:flex; flex-direction:column; align-items:flex-end; gap:7px; min-width:90px; }
.req-timer { font-family:var(--mono); font-size:18px; font-weight:600; color:var(--red); }

/* ETA */
.eta-box { margin-top:10px; padding:10px 14px; border-radius:9px; display:flex; justify-content:space-between; align-items:center; }
.eta-box.waiting { background:#FFFBEB; border:1px solid var(--yellow); }
.eta-box.arrived { background:#F0FDF4; border:1px solid var(--green); }
.eta-val { font-family:var(--mono); font-size:20px; font-weight:700; }

/* ── ALERT CARD ──────────────────────────────────────── */
.alert-card { background:var(--white); border:1.5px solid var(--red); border-radius:14px; padding:26px; margin-bottom:18px; box-shadow:0 0 0 4px rgba(217,58,70,.06); }
.alert-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:18px; }
.adet { background:var(--s1); border-radius:8px; padding:10px 13px; }
.adet-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
.adet-val { font-size:13px; font-weight:600; }
.ranking-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--s1); border-radius:8px; margin-bottom:6px; font-size:13px; }
.ranking-item.top { background:#F0FDF4; border:1px solid var(--green); }
.alert-btns { display:flex; gap:10px; margin-top:4px; }
.btn-accept  { flex:2; padding:13px; background:var(--green); color:white; border:none; border-radius:9px; font-family:'Heebo',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }
.btn-decline { flex:1; padding:13px; background:var(--s1); color:var(--muted); border:1.5px solid var(--border); border-radius:9px; font-family:'Heebo',sans-serif; font-size:13px; cursor:pointer; }

/* ── USER CARD ───────────────────────────────────────── */
.user-card { background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:13px 16px; display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.user-avatar-lg { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; color:white; flex-shrink:0; }
.user-card-info { flex:1; }
.user-card-name { font-size:14px; font-weight:600; }
.user-card-sub  { font-size:11px; color:var(--muted); margin-top:2px; }
.user-card-actions { display:flex; gap:6px; }
.icon-btn { width:30px; height:30px; border-radius:7px; border:1.5px solid var(--border); background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all .2s; }
.icon-btn:hover { border-color:var(--text); }
.icon-btn.del:hover { border-color:var(--red); background:#FFF1F2; }

/* ── ADD FORM ────────────────────────────────────────── */
.add-form { background:var(--s1); border:1.5px dashed var(--border); border-radius:10px; padding:18px; margin-top:14px; }

/* ── SPLIT ───────────────────────────────────────────── */
.split { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.placeholder-box { background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:40px; text-align:center; color:var(--muted); }
.placeholder-icon { font-size:40px; margin-bottom:10px; }

/* ── TABLE ───────────────────────────────────────────── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { text-align:right; padding:9px 13px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); font-family:var(--mono); }
td { padding:11px 13px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--s1); }

/* ── TOAST ───────────────────────────────────────────── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:white; border-radius:10px; padding:12px 22px; font-size:13px; font-weight:600; z-index:999; transition:transform .4s cubic-bezier(.175,.885,.32,1.275); white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.2); }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok  { background:#047857; }
.toast.err { background:var(--red); }

/* ── TRANSPORT BADGE ─────────────────────────────────── */
.t-yes { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; background:#D1FAE5; color:#047857; }
.t-no  { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; background:#FEE2E2; color:var(--red); }

/* ── EMPTY ───────────────────────────────────────────── */
.empty { text-align:center; padding:56px 20px; color:var(--muted); }
.empty-icon { font-size:42px; margin-bottom:10px; }

/* ── FIRST LOGIN ─────────────────────────────────────── */
#firstlogin-screen { min-height:100vh; display:none; align-items:center; justify-content:center; background:linear-gradient(135deg, #1A1B2E 0%, #1A3350 100%); }
.firstlogin-card { background:var(--white); border-radius:20px; padding:48px 44px; width:100%; max-width:420px; box-shadow:0 24px 64px rgba(0,0,0,.25); }

@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin-right:0;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .split{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
  .alert-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Surge<span>Net</span></div>
    <div class="login-sub">מערכת תיאום מנתחי חירום בין-בתי חולים</div>
    <div class="error-msg" id="login-err"></div>
    <div class="info-msg"  id="login-info"></div>
    <div class="field-group"><label>שם משתמש</label><input id="login-user" type="text" placeholder="הכנס שם משתמש" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="field-group"><label>סיסמה</label><input id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-primary" onclick="doLogin()">כניסה</button>
  </div>
</div>

<!-- FIRST LOGIN -->
<div id="firstlogin-screen">
  <div class="firstlogin-card">
    <div class="login-logo" style="color:#3BBDE0">Surge<span>Net</span></div>
    <div style="margin:10px 0 28px"><div style="font-size:18px;font-weight:800;margin-bottom:4px">כניסה ראשונה</div><div style="color:var(--muted);font-size:13px">בחר סיסמה אישית</div></div>
    <div class="error-msg" id="fl-err"></div>
    <div class="field-group"><label>שם משתמש</label><input id="fl-user" disabled style="opacity:.6"></div>
    <div class="field-group"><label>סיסמה חדשה</label><input id="fl-pass1" type="password" placeholder="לפחות 6 תווים"></div>
    <div class="field-group"><label>אימות סיסמה</label><input id="fl-pass2" type="password" placeholder="הכנס שוב" onkeydown="if(event.key==='Enter')doFirstLogin()"></div>
    <button class="btn-primary" style="background:#3BBDE0" onclick="doFirstLogin()">קבע סיסמה וכנס</button>
  </div>
</div>

<!-- AVAILABILITY -->
<div id="avail-modal">
  <div class="avail-card">
    <div class="avail-emoji">🏥</div>
    <div class="avail-title">שלום, <span id="avail-name"></span></div>
    <div class="avail-sub">האם ביכולתך להגיע לבית חולים אחר במידת הצורך?</div>
    <div class="avail-btns">
      <button class="btn-avail-yes" onclick="showTransport()">כן, אני יכול להגיע</button>
      <button class="btn-avail-no"  onclick="saveAvailability(false, null)">לא כרגע</button>
    </div>
    <div class="transport-opts" id="transport-opts">
      <div class="transport-opt" onclick="pickTransport('רכב פרטי')">🚗 רכב פרטי</div>
      <div class="transport-opt" onclick="pickTransport('הסעה מבית החולים')">🚐 הסעה מבית החולים</div>
      <div class="transport-opt" onclick="pickTransport('אמבולנס / רכב חירום')">🚑 אמבולנס / רכב חירום</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Surge<span>Net</span></div>
    <div class="topbar-right">
      <div class="live-dot"></div>
      <div class="user-chip">
        <div class="user-avatar" id="ua"></div>
        <div><div class="user-name" id="un"></div><div class="role-badge" id="rb"></div></div>
      </div>
      <button class="btn-logout" onclick="doLogout()">יציאה</button>
    </div>
  </div>

  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="pages"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── state ─────────────────────────────────────────────────────────
var CU = null;  // current user
var currentPage = '';
var requests = [];
var urgency = 'critical';
var timers = {};
var tickInterval = null;

var ROLE_LABELS = { admin:'מנהל מערכת', hospital_ceo:'ראש בית חולים', dept_head:'ראש מחלקה', surgeon:'מנתח', dept_staff:'צוות מחלקה' };
var ROLE_COLORS = { admin:'#D93A46', hospital_ceo:'#F5C842', dept_head:'#3BBDE0', surgeon:'#05C08A', dept_staff:'#B06CE3' };

// ── api helper ────────────────────────────────────────────────────
async function api(method, path, body) {
  var opts = { method, headers:{'Content-Type':'application/json'}, credentials:'same-origin' };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch('/api' + path, opts);
  var data = await r.json();
  if (!r.ok) throw new Error(data.error || 'שגיאה');
  return data;
}

// ── auth ──────────────────────────────────────────────────────────
async function doLogin() {
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  var err = document.getElementById('login-err');
  err.style.display = 'none';
  try {
    var data = await api('POST', '/login', { username:u, password:p });
    if (data.first_login) {
      document.getElementById('fl-user').value = u;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('firstlogin-screen').style.display = 'flex';

function launchApp() {

  var ua = document.getElementById('ua');
  ua.textContent = CU.emoji || '👤';

var NAV = {
  admin:        [['admin_dash','📊','מרכז בקרה'],['all_req','📋','כל הבקשות'],['sys_users','👥','משתמשים'],['my_profile','👤','הפרופיל שלי']],
  hospital_ceo: [['ceo_dash','📊','סקירה'],['ceo_users','👥','מחלקות'],['my_profile','👤','הפרופיל שלי']],
  dept_head:    [['send_req','📤','בקשה חדשה'],['my_req','📋','בקשות המחלקה'],['dept_surgeons','🩺','המנתחים שלי'],['my_profile','👤','הפרופיל שלי']],
  surgeon:      [['open_req','🚨','בקשות פתוחות'],['my_profile','👤','הפרופיל שלי']],
  dept_staff:   [['staff_send','📤','בקשה חדשה'],['staff_req','📋','בקשות המחלקה'],['my_profile','👤','הפרופיל שלי']],
};

function buildNav() {
  var sidebar = document.getElementById('sidebar');
  var pages   = document.getElementById('pages');
  sidebar.innerHTML = ''; pages.innerHTML = '';

  var items = NAV[CU.role] || [];
  items.forEach(function(item, i) {
    var id=item[0], icon=item[1], label=item[2];
    var el = document.createElement('div');
    el.className = 'nav-item' + (i===0?' active':'');
    el.innerHTML = '<span class="nav-icon">'+icon+'</span>'+label;
    el.onclick = (function(pid,t){ return function(){ switchPage(pid,t); }; })(id, el);
    sidebar.appendChild(el);

    var pg = document.createElement('div');
    pg.className = 'page' + (i===0?' active':'');
    pg.id = 'page-'+id;
    pages.appendChild(pg);
  });

  if (items.length) { currentPage = items[0][0]; renderPage(currentPage); }
}

function switchPage(id, tab) {
  document.querySelectorAll('.nav-item').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  tab.classList.add('active');
  var pg = document.getElementById('page-'+id);
  if (pg) { pg.classList.add('active'); renderPage(id); }
  currentPage = id;
}

function renderPage(id) {
  var el = document.getElementById('page-'+id); if (!el) return;
  var map = { admin_dash:pgAdminDash, all_req:pgAllReq, sys_users:pgSysUsers,
              ceo_dash:pgCeoDash, ceo_users:pgCeoUsers,
              send_req:pgSendReq, my_req:pgMyReq, dept_surgeons:pgDeptSurgeons,
              open_req:pgOpenReq, my_profile:pgMyProfile,
              staff_send:pgStaffSend, staff_req:pgStaffReq };
  if (map[id]) map[id](el);
}

function tick() {
  requests.forEach(function(r){ if(r.status==='searching') r._elapsed = (r._elapsed||0)+1; });
  ['my_req','staff_req','open_req','all_req'].forEach(function(pid){
    if(currentPage===pid){ var el=document.getElementById('page-'+pid); if(el && el.classList.contains('active')) renderPage(pid); }
  });
}

async function submitReq(senderName, senderRole) {
  var pname   = (document.getElementById('f-pname')||{}).value||'';
  var page    = (document.getElementById('f-page') ||{}).value||'';
  var pgender = (document.getElementById('f-pgender')||{}).value||'';
  var pcond   = (document.getElementById('f-pcond')||{}).value||'';
  var pmeds   = (document.getElementById('f-pmeds')||{}).value||'';
  var spec    = (document.getElementById('f-spec') ||{}).value||'נוירוכירורגיה';
  var pid     = (document.getElementById('f-pid')  ||{}).value||'';

  if(!pname.trim()){ showToast('יש למלא שם מטופל','err'); return; }
  if(!page.trim()) { showToast('יש למלא גיל','err'); return; }
  if(!pgender)     { showToast('יש לבחור מין','err'); return; }
  if(!pcond.trim()){ showToast('יש למלא מצב רפואי','err'); return; }
  if(!pmeds.trim()){ showToast('יש למלא תרופות / אלרגיות','err'); return; }

  try {
    var body = {
      specialty: spec, urgency,
      patient_name: pname.trim(), patient_age: page.trim(),
      patient_gender: pgender, condition: pcond.trim(),
      meds: pmeds.trim(), record_id: pid,
      sender_name: senderName || CU.name,
    };
    await api('POST', '/requests', body);
    showToast('✅ הבקשה נשלחה — מחפש מנתח...','ok');
    urgency = 'critical';
    await loadRequests();
    renderPage(currentPage);
  } catch(e) { showToast(e.message,'err'); }
}

async function loadRequests() {
  try {
    var data = await api('GET', '/requests');
    requests = data.map(function(r){ r._elapsed = r._elapsed||0; return r; });
  } catch(e) { requests = []; }
}

async function changePassword() {
  var oldPw  = (document.getElementById('pw-old')  || {}).value || '';
  var newPw1 = (document.getElementById('pw-new1') || {}).value || '';
  var newPw2 = (document.getElementById('pw-new2') || {}).value || '';
  var msg = document.getElementById('pw-msg');
  if (!oldPw)         { showMsg(msg, 'יש להזין סיסמה נוכחית', 'err'); return; }
  if (newPw1.length < 6) { showMsg(msg, 'הסיסמה החדשה חייבת להכיל לפחות 6 תווים', 'err'); return; }
  if (newPw1 !== newPw2)  { showMsg(msg, 'הסיסמאות החדשות אינן תואמות', 'err'); return; }
  try {
    await api('POST', '/change-password', { old_password: oldPw, new_password: newPw1 });
    showMsg(msg, '✅ הסיסמה שונתה בהצלחה', 'ok');
    document.getElementById('pw-old').value = '';
    document.getElementById('pw-new1').value = '';
    document.getElementById('pw-new2').value = '';
  } catch(e) { showMsg(msg, e.message, 'err'); }
}

function showMsg(el, text, type) {
  el.style.display = 'block';
  el.textContent = text;
  el.style.background = type === 'ok' ? '#D1FAE5' : '#FEE2E2';
  el.style.color       = type === 'ok' ? '#047857' : 'var(--red)';
  el.style.padding = '10px 14px';
  el.style.borderRadius = '8px';
  el.style.fontSize = '13px';
}

// ── build req card ─────────────────────────────────────────────────
function buildReqCard(r, showPatient, selectable) {
  var div = document.createElement('div');
  var cls = r.status==='matched'?'matched':r.status==='completed'?'completed':r.urgency||'medium';
  div.className = 'req-card '+cls+(selectable?' selectable':'');

  var elapsed = r._elapsed||0;
  var mins = Math.floor(elapsed/60).toString().padStart(2,'0');
  var secs = (elapsed%60).toString().padStart(2,'0');

  var timerHtml='';
  if(r.status==='completed'){
    timerHtml='<span class="badge badge-gray">הסתיים</span>';
  } else if(r.status==='matched'){
    var matchedMs = r.matched_at ? (Date.now()-new Date(r.matched_at).getTime()) : 0;
    var matchedMin = Math.floor(matchedMs/60000);
    var rem = r.eta_minutes ? Math.max(0,r.eta_minutes-matchedMin) : null;
    if(rem===0) timerHtml='<span style="color:var(--green);font-size:12px;font-weight:700">🏥 הגיע</span>';
    else if(rem) timerHtml='<span style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--yellow)">'+rem+'</span><span style="color:var(--muted);font-size:10px"> דקות</span>';
    else timerHtml='<span class="badge badge-green">✓</span>';
  } else {
    timerHtml='<span class="req-timer">'+mins+':'+secs+'</span>';
  }

  var badgeCls = r.status==='matched'?'badge-green':r.urgency==='critical'?'badge-red':'badge-yellow';
  var badgeTxt = r.status==='matched'?'✓ הותאם':r.urgency==='critical'?'⚡ קריטי':'🟡 גבוה';

  var surgLine='';
  if(r.status==='matched'&&r.surgeon_id){
    var matchedMs2=r.matched_at?(Date.now()-new Date(r.matched_at).getTime()):0;
    var matchedMin2=Math.floor(matchedMs2/60000);
    var rem2=r.eta_minutes?Math.max(0,r.eta_minutes-matchedMin2):null;
    surgLine='<br><span style="color:var(--green)">✓ מנתח אישר</span>'+
      '<br><span style="color:var(--muted);font-size:11px">'+(r.traffic_label||'')+' · '+(r.dist_km||'')+(r.dist_km?' ק"מ':'')+' · ETA '+r.eta_minutes+' דקות</span>';
    if(rem2===0) surgLine+='<div class="eta-box arrived"><span style="font-size:12px;color:var(--green)">🏥 המנתח הגיע</span></div>';
    else if(rem2) surgLine+='<div class="eta-box waiting"><span style="font-size:12px;color:#92400E">⏱ זמן הגעה משוער</span><span class="eta-val" style="color:var(--yellow)">'+rem2+' דקות</span></div>';
  }

  var patLine = showPatient&&r.patient?'<br>מטופל: '+r.patient.name+', '+r.patient.age+', '+r.patient.gender:'';
  var endBtn = (r.status==='matched'&&!selectable)?'<button onclick="endSurgery('+r.id+')" style="margin-top:8px;padding:6px 14px;background:var(--green);color:white;border:none;border-radius:7px;font-family:Heebo,sans-serif;font-size:12px;font-weight:700;cursor:pointer">✓ הניתוח הסתיים</button>':'';

  div.innerHTML='<div class="req-main">'+
    '<div class="req-title">'+r.specialty+'</div>'+
    '<div class="req-meta"><strong>'+r.hospital+'</strong> · '+r.dept+' · '+r.requested_by+patLine+surgLine+'</div>'+
    endBtn+
  '</div><div class="req-side"><span class="badge '+badgeCls+'">'+badgeTxt+'</span>'+timerHtml+'</div>';
  return div;
}

// ── toast ──────────────────────────────────────────────────────────
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show'+(type?' '+type:'');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 3200);
}
